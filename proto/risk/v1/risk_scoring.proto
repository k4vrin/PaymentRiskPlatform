syntax = "proto3";

package risk.v1;

option java_package = "dev.kavrin.paymentrisk.risk.v1";
option java_multiple_files = true;
option java_outer_classname = "RiskScoringProto";

option go_package = "github.com/k4vrin/PaymentRiskPlatform/proto/gen/go/risk/v1;riskv1";

// Final risk decision returned by the risk scoring service.
// The zero value is reserved for unset or backward-compatible default states.
enum RiskDecision {
  RISK_DECISION_UNSPECIFIED = 0;
  RISK_DECISION_APPROVED = 1;
  RISK_DECISION_DECLINED = 2;
  RISK_DECISION_REVIEW_REQUIRED = 3;
}

// Stable machine-readable reason codes explaining risk decisions and rule hits.
// The zero value is reserved for unset or backward-compatible default states.
enum RiskReasonCode {
  RISK_REASON_CODE_UNSPECIFIED = 0;
  RISK_REASON_CODE_HIGH_AMOUNT = 1;
  RISK_REASON_CODE_SUSPICIOUS_CURRENCY = 2;
  RISK_REASON_CODE_REPEATED_DEVICE = 3;
  RISK_REASON_CODE_MERCHANT_RISK_THRESHOLD_EXCEEDED = 4;
  RISK_REASON_CODE_LOW_RISK_PAYMENT = 5;
}

// Request sent by the payment orchestrator to score one payment authorization attempt.
message ScorePaymentRequest {
  // Internal payment identifier generated by the payment orchestrator.
  string payment_id = 1;

  // Amount in minor currency units, for example cents for USD/EUR.
  int64 amount_minor = 2;

  // ISO 4217 currency code such as USD, EUR, or IRR.
  string currency = 3;

  // Merchant identifier used for merchant-specific risk rules.
  string merchant_id = 4;

  // Customer identifier used for customer and history-based risk rules.
  string customer_id = 5;

  // Device fingerprint or stable device signal used by risk rules.
  string device_fingerprint = 6;

  // Correlation ID propagated from the incoming REST request for tracing.
  string correlation_id = 7;
}

// Detailed explanation of one rule that contributed to the final risk score.
message RiskRuleHit {
  // Stable rule identifier, for example HIGH_AMOUNT_RULE.
  string rule_id = 1;

  // Stable machine-readable reason code for this rule hit.
  RiskReasonCode reason_code = 2;

  // Score contribution added by this rule.
  int32 score_delta = 3;

  // Human-readable explanation intended for logs, debugging, and operations views.
  string message = 4;
}

// Response returned by the risk scoring service after evaluating deterministic rules.
message ScorePaymentResponse {
  // Final numeric risk score. Higher score means higher risk.
  int32 score = 1;

  // Final decision derived from score and configured thresholds.
  RiskDecision decision = 2;

  // Stable reason codes summarizing why the decision was made.
  repeated RiskReasonCode reason_codes = 3;

  // Detailed rule hits explaining individual score contributions.
  repeated RiskRuleHit rule_hits = 4;

  // Risk rule version used to produce this response.
  string rule_version = 5;
}

// Internal gRPC service used by the payment orchestrator to score payment risk.
service RiskScoringService {
  // Scores one payment authorization attempt.
  // Callers should use a short explicit timeout budget because this RPC is on the synchronous payment authorization path.
  rpc ScorePayment(ScorePaymentRequest) returns (ScorePaymentResponse);
}
